version: "3.9"

services:
  quant-bot:
    build: .
    image: quant-bot:latest
    container_name: quant-paper-trader

    # --- Persistent Storage ---
    volumes:
      - quant_cache:/app/.data_cache   # Parquet data, SQLite DB, friction.json
      - quant_logs:/app/logs           # Daily run logs

    # --- Email Notification Config ---
    # Copy .env.example to .env and fill in your SMTP credentials.
    # NEVER commit .env to git.
    env_file:
      - .env

    # --- Cron Schedule ---
    # The container runs the daily signal generator at 18:00 JST (9:00 UTC).
    # Uses supercronic (below) for reliable cron inside Docker.
    command: >
      sh -c "echo '0 9 * * 1-5 PYTHONPATH=/app python3 /app/src/paper/bot.py generate >> /app/logs/daily.log 2>&1' | supercronic -"

    restart: unless-stopped
    
    # Healthcheck: ensure the DB file exists (means at least one run succeeded)
    healthcheck:
      test: ["CMD", "test", "-f", "/app/.data_cache/paper_trade.db"]
      interval: 1h
      timeout: 10s
      retries: 3

volumes:
  quant_cache:
  quant_logs:
