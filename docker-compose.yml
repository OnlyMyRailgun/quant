version: "3.9"

services:
  quant-bot:
    build: .
    image: quant-bot:latest
    container_name: quant-paper-trader

    # --- Persistent Storage ---
    volumes:
      - quant_cache:/app/.data_cache   # Parquet data, SQLite DB, friction.json
      - quant_logs:/app/logs           # Daily run logs

    # --- Email Notification Config ---
    # Copy .env.example to .env and fill in your SMTP credentials.
    # NEVER commit .env to git.
    env_file:
      - .env

    # --- Cron Schedule ---
    # Runs daily at 15:45 JST (06:45 UTC) on weekdays.
    # Uses supercronic for reliable cron inside Docker.
    command: >
      sh -c "echo '45 6 * * 1-5 python3 -m src.paper.bot generate --universe-name japan_large_30 --reversal-filter --auto-fill >> /app/logs/daily.log 2>&1' > /tmp/crontab && supercronic /tmp/crontab"

    restart: unless-stopped
    
    # Healthcheck: ensure the DB file exists (means at least one run succeeded)
    healthcheck:
      test: ["CMD", "test", "-f", "/app/.data_cache/paper_trade.db"]
      interval: 1h
      timeout: 10s
      retries: 3

volumes:
  quant_cache:
  quant_logs:
